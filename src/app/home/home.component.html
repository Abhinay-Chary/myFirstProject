<ul class="nav nav-pills nav-fill gap-2 p-1 small bg-primary rounded-5 shadow-sm" style="position: fixed;" id="pillNav2"
  role="tablist"
  style="--bs-nav-link-color: var(--bs-white); --bs-nav-pills-link-active-color: var(--bs-primary); --bs-nav-pills-link-active-bg: var(--bs-white);">
  <li class="nav-item" role="presentation">
    <button class="nav-link active rounded-5" id="home-tab2" data-bs-toggle="tab" type="button" role="tab"
      aria-selected="true" (click)="open('appView')">Home</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link rounded-5" id="profile-tab2" data-bs-toggle="tab" type="button" role="tab"
      aria-selected="false" (click)="open('profileView')">Profile</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link rounded-5" id="contact-tab2" data-bs-toggle="tab" type="button" role="tab"
      aria-selected="false" (click)="open('cart')">cart({{val }})</button>
  </li>
</ul>
@if (
appView
) {
<app-view [fruits]='fruits'> </app-view>
}
@if (
profileView
) {
<app-profile></app-profile>
}
@if (
cart
) {
<app-cart></app-cart>

}

<div class="timer">
  Time Elapsed : {{formattedTime()}}
</div>
